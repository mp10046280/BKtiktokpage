<!DOCTYPE html>
<html>
<head><title>Auth Callback</title></head>
<body>
<h2>TikTok Auth Callback</h2>
<p>Copy ค่านี้ไปวางในช่อง code ของ n8n (ตัดคำว่า "code: " ออกก่อน):</p>
<pre id="params">Loading...</pre>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('params').textContent = 'code: ' + params.get('code');
</script>
</body>
</html>
